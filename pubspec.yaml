name: shimur
description: אפליקציה למנהלי בתי ספר בחמ"ד - שימור המורים
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ">=3.11.0"
  firebase_auth: ">=6.1.3"
  cloud_firestore: ">=6.1.1"
  http: "^1.2.0"
  firebase_storage: "^13.0.6"
  firebase_messaging: ^16.1.2
  image_picker: ^1.0.7
  file_picker: 8.1.0  # גרסה 8.1.0 פותרת LateInitializationError ב־Web production
  
  # AI - Firebase AI Logic (Gemini דרך Firebase, בלי מפתח API בקוד)
  firebase_ai: ^3.8.0

  # UI & Navigation
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  kosher_dart: ^2.0.18
  material_hebrew_date_picker: ^1.2.2
  fl_chart: ^1.1.1
  excel: ^4.0.6
  confetti: ^0.8.0
  cloud_functions: ^6.0.7
  js: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

